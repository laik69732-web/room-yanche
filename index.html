<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜语 · Crosstalk Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Noto Serif SC', system-ui, serif;
            background: #F8F1E3;
            color: #3F2A1E;
        }
        
        .pixel-title {
            font-family: 'Press Start 2P', system-ui;
            font-size: 1.75rem;
            letter-spacing: 4px;
            color: #D97757;
            text-shadow: 2px 2px 0 #00000010;
        }

        .paper {
            background: #FBF6EB;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08),
                        inset 0 0 80px rgba(139, 69, 19, 0.04);
            border: 1px solid #E8D9C0;
        }

        .card {
            background: #FBF6EB;
            border: 2px solid #D4B99F;
            box-shadow: 4px 6px 0 #C9A37F;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-4px) rotate(1deg);
            box-shadow: 6px 10px 0 #C9A37F;
        }

        .tag {
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border: 2px solid #D4B99F;
            background: #FFFDF7;
        }
        
        .tag:hover {
            transform: scale(1.12) rotate(2deg);
            border-color: #E07A5F;
        }
        
        .tag.selected {
            background: linear-gradient(135deg, #E07A5F, #F4A261);
            color: white;
            border-color: #C05A3F;
            box-shadow: 0 0 0 3px #F8F1E3;
        }

        .record-card {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(30px) rotate(-3deg); }
            to { opacity: 1; transform: translateY(0) rotate(0); }
        }

        .dot-bg {
            background-image: 
                radial-gradient(circle, #D4B99F 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="min-h-screen pb-20 dot-bg">
    <div class="max-w-xl mx-auto px-5 pt-8">
        <!-- 标题区 - Crosstalk 风格 -->
        <div class="flex flex-col items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[#E07A5F] rounded flex items-center justify-center text-white text-2xl shadow-md">📻</div>
                <h1 class="pixel-title tracking-widest">CROSS TALK</h1>
            </div>
            <p class="text-xs text-[#8C6F4E] mt-1 tracking-[3px]">夜语日记 · 2026</p>
        </div>

        <!-- 输入区域 -->
        <div class="paper rounded-3xl p-8 mb-12 border-2 border-[#D4B99F]">
            <div class="space-y-8">
                <!-- 歌曲 -->
                <div>
                    <div class="flex items-center gap-2 mb-2 text-[#8C6F4E]">
                        <span class="text-xl">🎵</span>
                        <span class="font-medium tracking-wider text-sm">今日单曲</span>
                    </div>
                    <input id="songInput" type="text" 
                           placeholder="今天循环了哪首歌？"
                           class="w-full bg-white border-2 border-[#E8D9C0] focus:border-[#E07A5F] rounded-2xl px-5 py-4 text-base outline-none">
                </div>

                <!-- 情绪标签 -->
                <div>
                    <div class="flex items-center gap-2 mb-3 text-[#8C6F4E]">
                        <span class="text-xl">☁️</span>
                        <span class="font-medium tracking-wider text-sm">此刻心情</span>
                    </div>
                    <div id="tagsContainer" class="grid grid-cols-3 gap-3">
                        <!-- JS 生成 -->
                    </div>
                </div>

                <!-- 记录内容 -->
                <div>
                    <div class="flex items-center gap-2 mb-2 text-[#8C6F4E]">
                        <span class="text-xl">✍️</span>
                        <span class="font-medium tracking-wider text-sm">写给今晚的自己</span>
                    </div>
                    <textarea id="contentInput" rows="5" 
                              placeholder="今天发生了什么……想说的话，就写在这里吧。"
                              class="w-full bg-white border-2 border-[#E8D9C0] focus:border-[#E07A5F] rounded-3xl px-5 py-5 text-base outline-none resize-none"></textarea>
                </div>

                <!-- 保存按钮 -->
                <button onclick="saveRecord()" 
                        class="w-full py-5 bg-gradient-to-r from-[#E07A5F] to-[#F4A261] text-white font-medium rounded-2xl text-lg shadow-md active:scale-95 transition-all border-b-4 border-[#C05A3F]">
                    保存这页日记
                </button>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="flex justify-between items-center mb-6 px-1">
            <h2 class="text-xl font-medium text-[#5C4633]">我的记录</h2>
            <span id="recordCount" class="text-sm text-[#8C6F4E]">0 条</span>
        </div>

        <div id="recordsContainer" class="space-y-8">
            <!-- JS 动态插入 -->
        </div>
    </div>

    <script>
        const emotions = [
            {name: "平静", emoji: "🌊"},
            {name: "温柔", emoji: "🌸"},
            {name: "怀念", emoji: "📼"},
            {name: "喜悦", emoji: "☀️"},
            {name: "疲惫", emoji: "🪴"},
            {name: "期待", emoji: "🌟"},
            {name: "失落", emoji: "🌧️"},
            {name: "温暖", emoji: "🧸"},
            {name: "迷茫", emoji: "🌫️"}
        ];

        let selectedTags = [];
        let records = JSON.parse(localStorage.getItem('crosstalkDiary')) || [];

        function renderTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = '';
            emotions.forEach(emo => {
                const tag = document.createElement('div');
                tag.className = `tag text-center py-3 px-4 rounded-2xl text-sm cursor-pointer select-none flex items-center justify-center gap-1.5`;
                tag.innerHTML = `${emo.emoji} ${emo.name}`;
                tag.addEventListener('click', () => {
                    if (selectedTags.includes(emo.name)) {
                        selectedTags = selectedTags.filter(t => t !== emo.name);
                        tag.classList.remove('selected');
                    } else {
                        selectedTags.push(emo.name);
                        tag.classList.add('selected');
                    }
                });
                container.appendChild(tag);
            });
        }

        function saveRecord() {
            const song = document.getElementById('songInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();

            if (!content && selectedTags.length === 0) {
                alert('写点什么吧～');
                return;
            }

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleDateString('zh-CN', {month:'long', day:'numeric', weekday:'short'}),
                time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}),
                song: song || "未记录歌曲",
                tags: [...selectedTags],
                content: content || "今天只想静静地翻一页日记。"
            };

            records.unshift(newRecord);
            localStorage.setItem('crosstalkDiary', JSON.stringify(records));

            // 清空
            document.getElementById('songInput').value = '';
            document.getElementById('contentInput').value = '';
            selectedTags = [];
            renderTags();
            renderRecords();

            // 反馈
            const btn = document.querySelector('button');
            const origText = btn.textContent;
            btn.textContent = '已保存 ✓';
            setTimeout(() => btn.textContent = origText, 1500);
        }

        function renderRecords() {
            const container = document.getElementById('recordsContainer');
            container.innerHTML = '';
            document.getElementById('recordCount').textContent = records.length + ' 条';

            records.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = `record-card paper rounded-3xl p-7`;
                div.style.animationDelay = (i * 60) + 'ms';

                let tagHTML = r.tags.map(t => 
                    `<span class="inline-block bg-[#FFFDF7] border border-[#E8D9C0] text-xs px-4 py-1 rounded-xl mr-2 mb-2">${t}</span>`
                ).join('');

                div.innerHTML = `
                    <div class="flex justify-between text-xs text-[#8C6F4E]">
                        <div>${r.date}　${r.time}</div>
                        <div class="text-xl">📖</div>
                    </div>
                    ${r.song ? `<div class="mt-4 flex items-center gap-2 text-[#E07A5F]"><span class="text-lg">♫</span><span class="line-clamp-1">${r.song}</span></div>` : ''}
                    <div class="my-6 leading-relaxed text-[#3F2A1E] text-[15.5px]">${r.content}</div>
                    <div class="flex flex-wrap">${tagHTML}</div>
                    <div class="mt-6 pt-5 border-t border-[#E8D9C0] text-xs text-[#8C6F4E]">晚安，今晚也好好被温柔对待。</div>
                `;
                container.appendChild(div);
            });
        }

        function init() {
            renderTags();
            renderRecords();
        }

        window.onload = init;
    </script>
</body>
</html>
