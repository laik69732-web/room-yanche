<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROOM · 颜澈</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0b1a2a,#02060d);
  color:white;
}

.container{
  padding:20px;
}

.card{
  padding:15px;
  border:1px solid #3a5a7a;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.vinyl{
  width:60px;
  height:60px;
  border-radius:50%;
  background:radial-gradient(circle,#222 40%,#000 70%);
  margin-bottom:10px;
}

.page{
  display:none;
}

.active{
  display:block;
}

textarea,input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3a5a7a;
  color:white;
}

.chat{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>ROOM · 颜澈</h2>

<!-- 首页 -->
<div id="home" class="page active">

<input id="musicName" placeholder="今天的歌（歌名+歌手）">
<textarea id="feeling" placeholder="你现在的感觉…"></textarea>
<button onclick="add()">保存</button>

<div id="list"></div>

</div>

<!-- 聊天页 -->
<div id="chat" class="page">

<h3 id="title"></h3>

<div id="chatBox"></div>

<textarea id="chatInput" placeholder="想说点什么…"></textarea>
<button onclick="send()">发送</button>
<button onclick="back()">返回</button>

</div>

</div>

<script>

let current = 0;

function add(){
  let name = document.getElementById("musicName").value;
  let feeling = document.getElementById("feeling").value;

  let data = JSON.parse(localStorage.getItem("music")||"[]");

  data.push({
    name,
    messages:[
      {role:"user",content:feeling},
      {role:"ai",content:reply(feeling)}
    ]
  });

  localStorage.setItem("music",JSON.stringify(data));

  load();
}

function load(){
  let data = JSON.parse(localStorage.getItem("music")||"[]");
  let list = document.getElementById("list");

  list.innerHTML="";

  data.forEach((d,i)=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="vinyl"></div>
      <b>${d.name}</b>
      <div>${d.messages[0].content}</div>
    `;

    div.onclick=()=>openChat(i);

    list.appendChild(div);
  });
}

function openChat(i){
  current=i;

  document.getElementById("home").classList.remove("active");
  document.getElementById("chat").classList.add("active");

  render();
}

function back(){
  document.getElementById("chat").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function render(){
  let data = JSON.parse(localStorage.getItem("music")||"[]");
  let chat = data[current].messages;

  document.getElementById("title").innerText=data[current].name;

  let box=document.getElementById("chatBox");
  box.innerHTML="";

  chat.forEach(m=>{
    box.innerHTML+=`<div class="chat"><b>${m.role=="user"?"你":"他"}：</b>${m.content}</div>`;
  });
}

function send(){
  let text=document.getElementById("chatInput").value;
  if(!text) return;

  let data = JSON.parse(localStorage.getItem("music")||"[]");

  data[current].messages.push({role:"user",content:text});
  data[current].messages.push({role:"ai",content:reply(text)});

  localStorage.setItem("music",JSON.stringify(data));

  document.getElementById("chatInput").value="";

  render();
}

function reply(text){
  let r=[
    "你现在说的，比你表现出来的更重一点。",
    "这首歌，好像刚好把你卡住的地方碰到了。",
    "你不是想太多，是你真的在感受。",
    "我在听，你慢慢说。",
    "这种感觉，你已经撑了一阵子了吧。",
    "不是歌让你这样，是你刚好需要它。"
  ];

  return r[Math.floor(Math.random()*r.length)];
}

load();

</script>

</body>
</html>
