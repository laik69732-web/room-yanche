<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ROOM</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#02060d;
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* 首页 */
.card{
  padding:16px;
  margin-bottom:12px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
}

/* 房间（沉浸） */
.room{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#02060d;
  padding:20px;
  display:none;
}

.show{display:block}

/* 聊天 */
.msg{
  margin:12px 0;
  max-width:80%;
  padding:12px;
  border-radius:14px;
}

.me{
  background:#4c7fff;
  margin-left:auto;
}

.him{
  background:rgba(255,255,255,0.08);
}

/* 输入 */
input,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  background:rgba(255,255,255,0.06);
  color:#fff;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4c7fff;
}

.topbar{
  margin-bottom:10px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<h2>ROOM</h2>

<input id="song" placeholder="歌名 + 歌手">
<textarea id="feeling" placeholder="这一刻的感觉..."></textarea>
<button onclick="add()">保存</button>

<div id="list"></div>

</div>

<!-- 房间 -->
<div id="room" class="room">
  <div class="topbar" onclick="closeRoom()">← 返回</div>
  <h3 id="roomTitle"></h3>
  <div id="chat"></div>

  <textarea id="input"></textarea>
  <button onclick="send()">发送</button>
</div>

<script>

let current = 0;

// 🧠 更像人的回复（沉浸版）
function reply(t){
  const arr=[
    "你刚刚那句话，其实没有说完。",
    "你是在想一个人，还是一个阶段？",
    "这种感觉不会突然来的，你已经带着它一段时间了。",
    "你不是突然这样，是慢慢变成这样的。",
    "你在这个点上停住了，对吗。",
    "我在，你可以慢慢说。",
    "这不像是随便说的，更像是压了很久。",
    "你其实是知道原因的，只是还没说出口。"
  ];
  return arr[Math.floor(Math.random()*arr.length)];
}

// 💾 保存
function add(){
  let data=JSON.parse(localStorage.getItem("music")||"[]");

  data.push({
    song:song.value,
    chat:[{me:feeling.value,him:reply(feeling.value)}]
  });

  localStorage.setItem("music",JSON.stringify(data));
  load();
}

// 📀 列表
function load(){
  let data=JSON.parse(localStorage.getItem("music")||"[]");
  list.innerHTML=data.map((d,i)=>`
    <div class="card" onclick="openRoom(${i})">${d.song}</div>
  `).join("");
}

// 🚪 进入房间（关键）
function openRoom(i){
  current=i;

  let data=JSON.parse(localStorage.getItem("music")||"[]");

  room.classList.add("show");
  roomTitle.innerText=data[i].song;

  render();
}

// ❌ 退出
function closeRoom(){
  room.classList.remove("show");
}

// 💬 渲染聊天
function render(){
  let data=JSON.parse(localStorage.getItem("music")||"[]");
  let html="";

  data[current].chat.forEach(c=>{
    html+=`<div class="msg me">${c.me}</div>`;
    html+=`<div class="msg him">${c.him}</div>`;
  });

  chat.innerHTML=html;
}

// 📩 发送（沉浸效果）
function send(){
  let text=input.value;
  if(!text) return;

  let data=JSON.parse(localStorage.getItem("music")||"[]");

  data[current].chat.push({me:text,him:"..."});
  localStorage.setItem("music",JSON.stringify(data));

  render();

  // ⏳ 模拟“思考”
  setTimeout(()=>{
    data=JSON.parse(localStorage.getItem("music")||"[]");
    data[current].chat[data[current].chat.length-1].him=reply(text);
    localStorage.setItem("music",JSON.stringify(data));
    render();
  },800);

  input.value="";
}

load();

</script>

</body>
</html>
