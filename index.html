<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blue diary</title>

<style>

/* ===== 背景（流动光）===== */
body{
  margin:0;
  font-family:-apple-system;
  color:#fff;
  background: linear-gradient(-45deg,#0b1220,#1b2a4a,#1a1f38,#101726);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ===== 容器 ===== */
.container{
  max-width:520px;
  margin:auto;
  padding:20px;
}

/* ===== 标题 ===== */
.title{
  font-size:28px;
  font-weight:600;
  margin-bottom:20px;
}

/* ===== 输入 ===== */
.input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:16px;
  border:none;
  background:rgba(255,255,255,0.06);
  color:#fff;
  backdrop-filter:blur(10px);
}

/* ===== 按钮（呼吸感）===== */
.button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  margin-top:10px;
  background:linear-gradient(90deg,#6a7cff,#4fa3ff);
  color:#fff;
  font-size:16px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px rgba(100,120,255,0.4)}
  to{box-shadow:0 0 20px rgba(100,120,255,0.8)}
}

/* ===== 标签 ===== */
.tags{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.tag{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  font-size:12px;
  transition:0.3s;
}

.tag.active{
  border-color:#6a7cff;
  color:#6a7cff;
  box-shadow:0 0 12px rgba(106,124,255,0.6);
}

/* ===== 卡片动画 ===== */
.card{
  margin-top:20px;
  padding:18px;
  border-radius:22px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  transform:translateY(20px);
  opacity:0;
  animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* ===== 拼豆（浮动）===== */
.cover{
  width:60px;
  height:60px;
  border-radius:16px;
  margin-bottom:10px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* ===== 回复 ===== */
.reply{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  font-size:14px;
  animation:fadeIn 0.8s forwards;
}

</style>
</head>

<body>

<div class="container">

<div class="title">blue diary</div>

<input class="input" id="song" placeholder="今天的歌">
<input class="input" id="mood" placeholder="你的感觉">

<div class="tags">
  <div class="tag active">晴朗</div>
  <div class="tag">平静</div>
  <div class="tag">阴雨</div>
  <div class="tag">起风</div>
</div>

<button class="button" onclick="save()">保存</button>

<div id="list"></div>

</div>

<script>

/* ===== 拼豆（稳定图，不会404）===== */
const covers=[
'https://picsum.photos/100?1',
'https://picsum.photos/100?2',
'https://picsum.photos/100?3',
'https://picsum.photos/100?4'
];

/* ===== 高级回复 ===== */
function getReplies(){
  const list=[
    "你在一点点靠近真实的自己。",
    "这种情绪是有重量的，但你在慢慢承接它。",
    "你没有逃避，而是在感受。",
    "有些状态不需要解决。",
    "你其实已经在变好了。"
  ];
  return list.sort(()=>0.5-Math.random()).slice(0,3);
}

/* ===== 保存 ===== */
function save(){
  const song=document.getElementById("song").value;
  const mood=document.getElementById("mood").value;

  const cover=covers[Math.floor(Math.random()*covers.length)];
  const replies=getReplies();

  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <img src="${cover}" class="cover">
    <div><b>🎵 ${song}</b></div>
    <div style="opacity:0.7;">☁ ${mood}</div>
    ${replies.map(r=>`<div class="reply">❤️ ${r}</div>`).join("")}
  `;

  document.getElementById("list").prepend(card);
}

</script>

</body>
</html>
