<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOM · 颜澈</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont;
    background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    color:#fff;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    font-size:28px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    margin-bottom:12px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.1);
    color:#fff;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#6366f1,#3b82f6);
    color:white;
    font-size:16px;
}

.card{
    margin-top:20px;
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:6px;
}

.feel{
    opacity:0.8;
    margin-bottom:10px;
}

.reply{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
    margin-top:6px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>ROOM · 颜澈</h1>

<input id="song" placeholder="今天的歌（歌名+歌手）">
<textarea id="feeling" placeholder="你现在的感觉..."></textarea>
<button onclick="save()">保存</button>

<div id="list"></div>

</div>

<script>

function getReplies(text){
    let base = [
        "这种情绪其实很真实，不用掩饰。",
        "你在慢慢表达自己，这很好。",
        "这首歌像是在替你说话。",
        "感觉你在一个比较安静的状态里。",
        "有点情绪，但也很克制。",
        "这种感觉挺值得被记住的。",
        "你不是随便听歌，是在感受。",
        "有点孤独，但不糟糕。",
        "你在认真生活，这很难得。"
    ];

    // 打乱顺序 + 取3条
    return base.sort(()=>0.5-Math.random()).slice(0,3);
}

function save(){
    let song = document.getElementById("song").value;
    let feeling = document.getElementById("feeling").value;

    if(!song) return;

    let data = JSON.parse(localStorage.getItem("room") || "[]");

    data.unshift({
        song,
        feeling,
        replies: getReplies(feeling)
    });

    localStorage.setItem("room", JSON.stringify(data));
    render();
}

function render(){
    let data = JSON.parse(localStorage.getItem("room") || "[]");
    let html = "";

    data.forEach(item=>{
        html += `
        <div class="card">
            <div class="title">🎵 ${item.song}</div>
            <div class="feel">💭 ${item.feeling || "（没有写感受）"}</div>

            ${item.replies.map(r=>`<div class="reply">🤍 ${r}</div>`).join("")}
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
