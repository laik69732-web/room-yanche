<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOM · 颜澈</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
  color:#fff;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#3b82f6);
  color:white;
  font-size:16px;
}

.card{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.title{
  font-size:18px;
  font-weight:bold;
}

.reply{
  margin-top:10px;
  color:#cbd5f5;
  font-size:14px;
}
</style>
</head>

<body>
<div class="container">

<h1>ROOM · 颜澈</h1>

<input id="song" placeholder="今天的歌（歌名+歌手）">
<textarea id="feeling" placeholder="你现在的感觉..."></textarea>

<button onclick="save()">保存</button>

<div id="list"></div>

<hr style="margin:30px 0;opacity:0.2">

<h1>📓 日记</h1>

<textarea id="diary" placeholder="今天发生了什么..."></textarea>
<button onclick="saveDiary()">保存日记</button>

<div id="diaryList"></div>

</div>

<script>

const replies = [
"你不是在听歌，你是在对某一段记忆反复确认。",
"有些情绪不是突然出现的，是一直没走。",
"这首歌像是在替你说你没说出口的话。",
"你在想的，可能不是那个人，而是那个时候的自己。",
"有时候喜欢一首歌，是因为它刚好在你最需要的时候出现。",
"你没有变，只是更清楚自己要什么了。",
"情绪没有对错，它只是提醒你还在认真生活。",
"你记住的不是旋律，是那一刻的你。",
"有些歌不会过期，因为情绪不会。",
"你不是脆弱，只是感受太清楚了。"
];

function getReply(){
  return replies[Math.floor(Math.random()*replies.length)];
}

function save(){
  let song = document.getElementById("song").value;
  let feeling = document.getElementById("feeling").value;

  let data = JSON.parse(localStorage.getItem("music")||"[]");

  data.unshift({
    song,
    feeling,
    reply:getReply()
  });

  localStorage.setItem("music",JSON.stringify(data));
  load();
}

function load(){
  let data = JSON.parse(localStorage.getItem("music")||"[]");
  let html="";

  data.forEach(d=>{
    html+=`
    <div class="card">
      <div class="title">${d.song||""}</div>
      <div>${d.feeling||""}</div>
      <div class="reply">💬 ${d.reply||""}</div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

function saveDiary(){
  let text=document.getElementById("diary").value;
  let data=JSON.parse(localStorage.getItem("diary")||"[]");

  data.unshift({
    text,
    reply:getReply()
  });

  localStorage.setItem("diary",JSON.stringify(data));
  loadDiary();
}

function loadDiary(){
  let data=JSON.parse(localStorage.getItem("diary")||"[]");
  let html="";

  data.forEach(d=>{
    html+=`
    <div class="card">
      <div>${d.text}</div>
      <div class="reply">💬 ${d.reply}</div>
    </div>
    `;
  });

  document.getElementById("diaryList").innerHTML=html;
}

load();
loadDiary();

</script>

</body>
</html>
